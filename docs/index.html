<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MID Tree Texture Generator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel input-panel">
        <div class="header">
          <div>
            <h1>MID Tree Texture Generator</h1>
            <p id="pathText">Checking API connection</p>
          </div>
          <span id="keyStatus" class="status">API</span>
        </div>

        <div class="recorder">
          <button id="recordButton" class="icon-button" type="button" title="Start or stop recording">REC</button>
          <div>
            <label for="requestText">Tree request</label>
            <textarea id="requestText" rows="7" placeholder="Example: a cherry blossom tree with many flowers, warm pale gray bark, suitable for a calm VR space"></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="randomButton" type="button">Random Prompt</button>
          <button id="refineButton" type="button">Refine</button>
          <button id="generateButton" type="button">Generate Textures</button>
        </div>
      </section>

      <section class="panel">
        <h2>Refined Request</h2>
        <div id="summary" class="summary">No refined request yet.</div>
      </section>

      <section class="preview-grid">
        <article class="preview">
          <div class="preview-title">Bark</div>
          <img id="barkPreview" alt="Generated bark texture">
        </article>
        <article class="preview">
          <div class="preview-title">Leaf</div>
          <img id="leafPreview" alt="Generated leaf texture">
        </article>
      </section>

      <section class="panel">
        <h2>Result</h2>
        <pre id="resultLog">Ready</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
